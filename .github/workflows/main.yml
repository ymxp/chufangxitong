name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build APK
      run: |
        docker run --rm -v $PWD:/app -w /app ghcr.io/kivy/buildozer:latest \
          bash -c "
            # 自动接受许可证
            yes | buildozer android debug --verbose
          "

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
